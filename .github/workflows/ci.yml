name: CI

on:
  push:
    branches: [main, alpha, beta]
  pull_request:
    branches: [main, alpha, beta]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run compile
      - run: bun run test:full

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test __tests__/smoke.test.ts
        env:
          SKIP_CAL: ${{ runner.os == 'Windows' && '1' || '' }}

  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run src/cli/index.ts --help
      - run: bun run src/cli/index.ts agents
      - run: bun run src/cli/index.ts --list
        timeout-minutes: 2

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, smoke, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - run: test -f dist/index.js

  compile:
    name: Compile (skills)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Validate skills + generate manifest
        run: bun run compile
      - name: Verify marketplace.json is current (committed manifest matches skills)
        run: git diff --exit-code .claude-plugin/marketplace.json
      - name: Verify no untracked generated artifacts (diff misses untracked files)
        run: test -z "$(git status --porcelain .claude-plugin README.md)"
      - name: Verify npm tarball ships the shelf (skills/ in package files)
        # sed strips lefthook's "sync hooks" line that pollutes npm's JSON stdout
        run: |
          npm pack --dry-run --json | sed -n '/^\[/,$p' | bun -e 'const files = JSON.parse(await Bun.stdin.text())[0].files.map(f => f.path); if (!files.some(p => p === "skills/rrr/SKILL.md")) { console.error("npm tarball is missing skills/ — check package.json files[]"); process.exit(1); } console.log("tarball ok: " + files.filter(p => p.startsWith("skills/")).length + " shelf files");'
      - name: Verify skill scripts are executable (mode 100755)
        run: bash scripts/check_skill_scripts_exec.sh
